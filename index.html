<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Popup</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: #f8bfd0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .floating-heart {
      position: absolute;
      font-size: 22px;
      opacity: 0.8;
      animation: floatUp linear infinite;
      user-select: none;
      pointer-events: none;
    }

    @keyframes floatUp {
      from {
        transform: translateY(40px) scale(0.9);
        opacity: 0;
      }
      20% { opacity: 0.9; }
      to {
        transform: translateY(-110vh) scale(1.2);
        opacity: 0;
      }
    }

    .card {
      width: min(90vw, 400px);
      background: #fff;
      border-radius: 30px;
      padding: 28px 24px 32px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      position: relative;
      z-index: 5;
    }

    .window-bar {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 14px;
      color: #888;
    }

    .cat {
      margin-top: 10px;
      line-height: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h1 {
      color: #ff2d7a;
      font-size: 34px;
      margin: 10px 0 8px;
    }

    p {
      color: #a24d67;
      font-size: 18px;
      margin: 0 0 24px;
    }

    .small-heart {
      font-size: 24px;
      display: block;
      margin-bottom: 8px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      min-height: 70px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 16px 34px;
      font-size: 28px;
      font-weight: bold;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: scale(1.04);
    }

    .yes-btn {
      color: #fff;
      background: linear-gradient(180deg, #ff4f93, #ff1f72);
      box-shadow: 0 12px 25px rgba(255, 31, 114, 0.35);
    }

    .no-btn {
      color: #b04f71;
      background: #ffe3ec;
      border: 2px solid #f3b3c8;
      font-size: 22px;
      padding: 14px 28px;
    }

    .result {
      margin-top: 22px;
      font-size: 22px;
      color: #ff2d7a;
      font-weight: bold;
      min-height: 30px;
    }

    .forever-text {
      margin-top: 14px;
      font-size: 28px;
      font-weight: 800;
      color: #ff2d7a;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(12px);
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #ff2d7a;
      width: 0;
      margin-left: auto;
      margin-right: auto;
      display: none;
    }

    .forever-text.show {
      display: block;
      animation: typing 3.2s steps(18, end) forwards, blink 0.7s step-end infinite;
    }

    .burst-heart {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      filter: drop-shadow(0 10px 22px rgba(255, 255, 255, 0.45));
    }

    .burst-heart img {
      width: 220px;
      height: 220px;
      object-fit: contain;
    }

    .burst-heart.show {
      animation: flowerBurst 2.4s ease-out forwards;
    }

    .flower-petal {
      position: fixed;
      font-size: 34px;
      opacity: 0;
      pointer-events: none;
      z-index: 19;
      transform: translate(-50%, -50%) scale(0.3);
      animation: petalExplode 2.2s ease-out forwards;
    }

    @keyframes flowerBurst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.9) rotate(45deg);
      }
      55% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2) rotate(120deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.8) rotate(220deg);
      }
    }

    @keyframes petalExplode {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      15% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.4) rotate(var(--r));
      }
    }

    @keyframes typing {
      from {
        width: 0;
        opacity: 1;
        transform: translateY(12px);
      }
      to {
        width: 18ch;
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {
      50% {
        border-color: transparent;
      }
    }

    .corner-btn {
      position: fixed;
      left: 24px;
      bottom: 24px;
      background: #ffe7ef;
      color: #b04f71;
      border: 2px solid #efb3c9;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 20px;
      font-weight: bold;
      z-index: 6;
    }

    @media (max-width: 520px) {
      h1 { font-size: 28px; }
      p { font-size: 16px; }
      .cat { font-size: 72px; }
      button { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="hearts"></div>
  <div class="burst-heart" id="burstHeart">
    <img src="Dance Love GIF.gif" style="width:200px;" />
  </div>

  <div class="card">
    <div class="window-bar">🗗 ✖</div>
    <div class="cat">
      <img id="mainGif" src="" alt="Cute GIF" style="width: 130px; height: 130px; object-fit: cover; border-radius: 24px;" />
    </div>
    <span class="small-heart">💕</span>
    <h1>Do you love me?</h1>
    <p>Please answer me 🥹</p>

    <div class="buttons" id="buttonsArea">
      <button class="yes-btn" id="yesBtn">Yes</button>
      <button class="no-btn" id="noBtn">No</button>
    </div>

    <div class="result" id="result"></div>
    <div class="forever-text" id="foreverText">B sl oun forever</div>
  </div>

  <button class="corner-btn" id="resetBtn">Reset</button>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const result = document.getElementById('result');
    const hearts = document.getElementById('hearts');
    const resetBtn = document.getElementById('resetBtn');
    const foreverText = document.getElementById('foreverText');
    const burstHeart = document.getElementById('burstHeart');
    const petalIcons = ['🌼', '🌸', '🌺', '💮', '✨', '💖'];

    const heartIcons = ['💗', '💖', '💕', '💘', '✨', '🌸'];

    // GIF options
    const gifOptions = [
      "Dudu GIF (1).gif",
      "Dudu GIF.gif",
      "Cat Love GIF by NGcorpvtc.gif"
    ];

    const mainGif = document.getElementById('mainGif');

    // random GIF at start
    mainGif.src = gifOptions[Math.floor(Math.random() * gifOptions.length)];

    // change GIF every 3 seconds
    setInterval(() => {
      mainGif.src = gifOptions[Math.floor(Math.random() * gifOptions.length)];
    }, 3000);
    let noClickCount = 0;

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = heartIcons[Math.floor(Math.random() * heartIcons.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 5 + Math.random() * 6 + 's';
      heart.style.fontSize = 14 + Math.random() * 18 + 'px';
      hearts.appendChild(heart);

      setTimeout(() => heart.remove(), 11000);
    }

    function createFlowerBurst() {
      for (let i = 0; i < 16; i++) {
        const petal = document.createElement('div');
        petal.className = 'flower-petal';
        petal.textContent = petalIcons[Math.floor(Math.random() * petalIcons.length)];
        petal.style.left = '50%';
        petal.style.top = '50%';
        const angle = (Math.PI * 2 * i) / 16;
        const distance = 120 + Math.random() * 180;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;
        petal.style.setProperty('--x', `calc(-50% + ${x}px)`);
        petal.style.setProperty('--y', `calc(-50% + ${y}px)`);
        petal.style.setProperty('--r', `${Math.floor(Math.random() * 360)}deg`);
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 2300);
      }
    }

    setInterval(createHeart, 450);
    for (let i = 0; i < 14; i++) setTimeout(createHeart, i * 150);

    yesBtn.addEventListener('click', () => {
      result.textContent = 'I love you too ❤️';
      document.body.style.background = '#f7b6cb';

      // change to couple GIF when yes
      mainGif.src = "Dudu GIF (1).gif";

      burstHeart.classList.remove('show');
      void burstHeart.offsetWidth;
      burstHeart.classList.add('show');
      createFlowerBurst();

      foreverText.classList.remove('show');
      foreverText.style.display = 'block';
      void foreverText.offsetWidth;
      foreverText.classList.add('show');

      for (let i = 0; i < 24; i++) setTimeout(createHeart, i * 90);
    });

    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('click', moveNoButton);

    function moveNoButton() {
      noClickCount++;
      const messages = [
        "You can't click me 😝",
        "Try Yes instead 💕",
        "Don't say no 🥹",
        "Come on, click Yes 😳",
        "Haha you missed me 😆"
      ];
      result.textContent = messages[(noClickCount - 1) % messages.length];

      const maxX = window.innerWidth - noBtn.offsetWidth - 20;
      const maxY = window.innerHeight - noBtn.offsetHeight - 20;
      noBtn.style.position = 'fixed';
      noBtn.style.left = Math.max(10, Math.random() * maxX) + 'px';
      noBtn.style.top = Math.max(10, Math.random() * maxY) + 'px';
      noBtn.style.zIndex = '10';

      const currentScale = 1 + Math.min(noClickCount * 0.12, 1.2);
      yesBtn.style.transform = `scale(${currentScale})`;
    }

    resetBtn.addEventListener('click', () => {
      noClickCount = 0;
      result.textContent = '';
      noBtn.style.position = 'static';
      noBtn.style.left = 'auto';
      noBtn.style.top = 'auto';
      yesBtn.style.transform = 'scale(1)';
      document.body.style.background = '#f8bfd0';
      foreverText.classList.remove('show');
      foreverText.style.display = 'none';
      foreverText.style.width = '0';
      burstHeart.classList.remove('show');
      document.querySelectorAll('.flower-petal').forEach(el => el.remove());
      mainGif.src = gifOptions[Math.floor(Math.random() * gifOptions.length)];
    });
  </script>
</body>
</html>
